<body>
<div id="appRoot"></div>

<script>
    // ---------- 自定义弹窗函数 ----------
    function showDialog(message, title = "提示", type = "info") {
        return new Promise((resolve) => {
            const dialog = document.createElement("div");
            dialog.className = "custom-dialog";
            
            const icon = type === "success" ? "🎉" : type === "error" ? "⚠️" : "ℹ️";
            
            dialog.innerHTML = `
                <div class="dialog-content">
                    <div class="dialog-icon">${icon}</div>
                    <div class="dialog-title">${title}</div>
                    <div class="dialog-message">${message}</div>
                    <div class="dialog-buttons">
                        <button class="dialog-btn confirm">确定</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(dialog);
            
            const confirmBtn = dialog.querySelector(".dialog-btn.confirm");
            confirmBtn.onclick = () => {
                dialog.remove();
                resolve(true);
            };
        });
    }
    
    function showConfirm(message, title = "确认") {
        return new Promise((resolve) => {
            const dialog = document.createElement("div");
            dialog.className = "custom-dialog";
            
            dialog.innerHTML = `
                <div class="dialog-content">
                    <div class="dialog-icon">❓</div>
                    <div class="dialog-title">${title}</div>
                    <div class="dialog-message">${message}</div>
                    <div class="dialog-buttons">
                        <button class="dialog-btn cancel">取消</button>
                        <button class="dialog-btn confirm">确定</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(dialog);
            
            const confirmBtn = dialog.querySelector(".dialog-btn.confirm");
            const cancelBtn = dialog.querySelector(".dialog-btn.cancel");
            
            confirmBtn.onclick = () => {
                dialog.remove();
                resolve(true);
            };
            cancelBtn.onclick = () => {
                dialog.remove();
                resolve(false);
            };
        });
    }

    // ---------- 游戏引擎 ----------
    class GameEngine {
        constructor(rows, cols, presetBoard = null) {
            this.rows = rows;
            this.cols = cols;
            if (presetBoard) {
                this.grid = presetBoard.map(row => [...row]);
                this.initialGridSnapshot = presetBoard.map(row => [...row]);
            } else {
                this.grid = this.generateRandomGrid(rows, cols);
                this.initialGridSnapshot = this.grid.map(row => [...row]);
            }
            this.selectedPieces = [];
            this.confirmed = false;
            this.historyStack = [];
            this.score = 0;
            this.stepCount = 0;
        }

        generateRandomGrid(rows, cols) {
            let grid = [];
            for (let i = 0; i < rows; i++) {
                grid[i] = [];
                for (let j = 0; j < cols; j++) {
                    grid[i][j] = Math.floor(Math.random() * 100);
                }
            }
            return grid;
        }

        saveToHistory() {
            this.historyStack.push({
                grid: this.grid.map(row => [...row]),
                selectedPieces: this.selectedPieces.map(p => ({...p})),
                score: this.score,
                stepCount: this.stepCount,
                confirmed: this.confirmed
            });
        }

        undo() {
            if (this.historyStack.length === 0) return false;
            const last = this.historyStack.pop();
            this.grid = last.grid.map(row => [...row]);
            this.selectedPieces = last.selectedPieces.map(p => ({...p}));
            this.score = last.score;
            this.stepCount = last.stepCount;
            this.confirmed = last.confirmed;
            return true;
        }

        resetToInitial() {
            this.grid = this.initialGridSnapshot.map(row => [...row]);
            this.selectedPieces = [];
            this.confirmed = false;
            this.historyStack = [];
            this.score = 0;
            this.stepCount = 0;
        }

        newGame() {
            this.grid = this.generateRandomGrid(this.rows, this.cols);
            this.initialGridSnapshot = this.grid.map(row => [...row]);
            this.selectedPieces = [];
            this.confirmed = false;
            this.historyStack = [];
            this.score = 0;
            this.stepCount = 0;
        }

        toggleSelect(row, col) {
            if (this.confirmed) return false;
            if (this.grid[row][col] === null) return false;
            const idx = this.selectedPieces.findIndex(p => p.r === row && p.c === col);
            if (idx !== -1) {
                this.selectedPieces.splice(idx, 1);
            } else {
                if (this.selectedPieces.length >= 5) return false;
                this.selectedPieces.push({r: row, c: col});
            }
            return true;
        }

        confirmSelection() {
            if (this.selectedPieces.length !== 5) return false;
            this.confirmed = true;
            this.saveToHistory();
            return true;
        }

        // 检查两个数字是否可以吞噬（对应位相同：十位对十位 或 个位对个位）
        canEat(attacker, target) {
            if (target === null) return true; // 空位可以直接移动
            const aTens = Math.floor(attacker / 10);
            const aOnes = attacker % 10;
            const tTens = Math.floor(target / 10);
            const tOnes = target % 10;
            return (aTens === tTens || aOnes === tOnes);
        }

move(dir) {
    if (!this.confirmed) return false;
    this.saveToHistory();

    let dr = 0, dc = 0;
    if (dir === 'up') dr = -1;
    else if (dir === 'down') dr = 1;
    else if (dir === 'left') dc = -1;
    else if (dir === 'right') dc = 1;

    const oldGrid = this.grid;
    const newGrid = oldGrid.map(row => [...row]);
    
    // 记录所有选中的棋子位置
    const selectedSet = new Set();
    for (let p of this.selectedPieces) {
        selectedSet.add(`${p.r},${p.c}`);
    }
    
    // 存储每个棋子的移动意图
    const moveInfos = [];
    
    // 第一步：计算每个棋子的移动意图
    for (let piece of this.selectedPieces) {
        const r = piece.r, c = piece.c;
        const val = oldGrid[r][c];
        if (val === null) continue;
        
        const nr = r + dr, nc = c + dc;
        
        // 边界检查
        if (nr < 0 || nr >= this.rows || nc < 0 || nc >= this.cols) {
            continue;
        }
        
        const targetVal = oldGrid[nr][nc];
        const isTargetSelected = selectedSet.has(`${nr},${nc}`);
        
        // 空位
        if (targetVal === null) {
            moveInfos.push({
                from: {r, c}, to: {r: nr, c: nc},
                fromVal: val, toVal: null,
                isEat: false, isTargetSelected: false,
                newVal: val
            });
        }
        // 目标是被选中的棋子
        else if (isTargetSelected) {
            moveInfos.push({
                from: {r, c}, to: {r: nr, c: nc},
                fromVal: val, toVal: targetVal,
                isEat: false, isTargetSelected: true,
                newVal: val
            });
        }
        // 目标是静止棋子
        else {
            const srcTens = Math.floor(val / 10);
            const srcOnes = val % 10;
            const tgtTens = Math.floor(targetVal / 10);
            const tgtOnes = targetVal % 10;
            
            if (srcTens === tgtTens || srcOnes === tgtOnes) {
                moveInfos.push({
                    from: {r, c}, to: {r: nr, c: nc},
                    fromVal: val, toVal: targetVal,
                    isEat: true, isTargetSelected: false,
                    newVal: (val + targetVal) % 100
                });
            }
            // 数字不匹配：不添加
        }
    }
    
    // 如果没有棋子能移动，直接返回
    if (moveInfos.length === 0) {
        this.undo();
        return false;
    }
    
    // 第二步：按移动方向排序（右边的先移动）
    moveInfos.sort((a, b) => {
        if (dir === 'right') return b.to.c - a.to.c;
        if (dir === 'left') return a.to.c - b.to.c;
        if (dir === 'up') return a.to.r - b.to.r;
        if (dir === 'down') return b.to.r - a.to.r;
        return 0;
    });
    
    // 第三步：检查目标格子冲突
    const targetSet = new Set();
    for (let info of moveInfos) {
        const key = `${info.to.r},${info.to.c}`;
        if (targetSet.has(key)) {
            this.undo();
            return false;
        }
        targetSet.add(key);
    }
    
    // 第四步：确定哪些棋子能真正移动（从最右边的棋子开始检查）
    // 创建一个 Map 记录最终有效的移动
    const finalMoves = new Map(); // key: 源位置, value: 移动信息
    
    // 从右向左处理（因为已经排序，右边的在前）
    for (let info of moveInfos) {
        // 如果是目标是选中的棋子
        if (info.isTargetSelected) {
            const targetKey = `${info.to.r},${info.to.c}`;
            // 检查目标棋子是否已经确定可以移动（已经在 finalMoves 中）
            const targetWillMove = finalMoves.has(targetKey);
            if (targetWillMove) {
                finalMoves.set(`${info.from.r},${info.from.c}`, info);
            }
            // 如果目标不会移动，则不能进入
        } else {
            // 空位或静止棋子，可以直接移动
            finalMoves.set(`${info.from.r},${info.from.c}`, info);
        }
    }
    
    if (finalMoves.size === 0) {
        this.undo();
        return false;
    }
    
    // 第五步：应用移动
    for (let [fromKey, info] of finalMoves) {
        newGrid[info.from.r][info.from.c] = null;
    }
    
    let addedScore = 0;
    for (let [fromKey, info] of finalMoves) {
        newGrid[info.to.r][info.to.c] = info.newVal;
        if (info.isEat) {
            addedScore += info.toVal;
        }
    }
    
    // 更新游戏状态
    this.grid = newGrid;
    this.score += addedScore;
    this.stepCount++;
    
    // 第六步：更新选中的棋子新坐标
    const newSelected = [];
    for (let piece of this.selectedPieces) {
        const fromKey = `${piece.r},${piece.c}`;
        const movedInfo = finalMoves.get(fromKey);
        
        if (movedInfo) {
            newSelected.push({r: movedInfo.to.r, c: movedInfo.to.c});
        } else if (newGrid[piece.r] && newGrid[piece.r][piece.c] !== null) {
            newSelected.push({r: piece.r, c: piece.c});
        }
    }
    
    this.selectedPieces = newSelected;
    if (this.selectedPieces.length === 0) {
        this.confirmed = false;
    }
    
    return true;
}

        getBoard() { return this.grid; }
        getSelected() { return this.selectedPieces; }
        isConfirmed() { return this.confirmed; }
        getScore() { return this.score; }
        getSteps() { return this.stepCount; }
        getInitialSnapshot() { return this.initialGridSnapshot.map(row => [...row]); }
    }

    // ---------- 历史记录管理 ----------
    const STORAGE_KEY = "NumEaterHistory";

    function loadHistory() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveHistory(history) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function addOrUpdateHistoryRecord(rows, cols, timeSec, steps, score, boardSnapshot) {
        let history = loadHistory();
        
        const existingIdx = history.findIndex(r => r.rows === rows && r.cols === cols && 
            JSON.stringify(r.boardSnapshot) === JSON.stringify(boardSnapshot));
        
        if (existingIdx !== -1) {
            if (score > history[existingIdx].score) {
                history[existingIdx] = { 
                    ...history[existingIdx], 
                    time: timeSec, 
                    steps: steps, 
                    score: score, 
                    date: new Date().toLocaleString() 
                };
                saveHistory(history);
            }
            return;
        }
        
        const newRecord = {
            id: Date.now(),
            rows, cols, time: timeSec, steps, score,
            boardSnapshot: boardSnapshot.map(row => [...row]),
            date: new Date().toLocaleString()
        };
        history.unshift(newRecord);
        if (history.length > 30) history.pop();
        saveHistory(history);
    }

    function deleteHistoryRecord(id) {
        let history = loadHistory();
        history = history.filter(rec => rec.id !== id);
        saveHistory(history);
        return history;
    }

    // ---------- UI 管理 ----------
    let currentGame = null;
    let timerSeconds = 0;
    let timerInterval = null;
    let isGameActive = false;
    let currentRows = 15, currentCols = 15;
    
    let currentZoom = 1.0;
    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2.0;
    const ZOOM_STEP = 0.05;
    const BASE_CELL_SIZE = 52;
    const GAP_SIZE = 3;
    const PADDING_SIZE = 12;

    const app = document.getElementById('appRoot');

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (isGameActive && currentGame) {
                timerSeconds++;
                updateInfoUI();
            }
        }, 1000);
    }

    function updateInfoUI() {
        const timerSpan = document.getElementById('gameTimer');
        const stepsSpan = document.getElementById('stepCount');
        const scoreSpan = document.getElementById('totalScore');
        if (timerSpan) timerSpan.innerText = timerSeconds;
        if (stepsSpan) stepsSpan.innerText = currentGame?.getSteps() || 0;
        if (scoreSpan) scoreSpan.innerText = currentGame?.getScore() || 0;
        const selectedSpan = document.getElementById('selectedCount');
        if (selectedSpan) selectedSpan.innerText = currentGame?.getSelected().length || 0;
    }

    function getBoardActualSize() {
        if (!currentGame) return { width: 0, height: 0 };
        const cellSize = BASE_CELL_SIZE * currentZoom;
        const rows = currentGame.rows, cols = currentGame.cols;
        const width = cols * cellSize + (cols - 1) * GAP_SIZE + PADDING_SIZE * 2;
        const height = rows * cellSize + (rows - 1) * GAP_SIZE + PADDING_SIZE * 2;
        return { width, height };
    }
    
    function getContainerSize() {
        const scrollContainer = document.getElementById('scrollContainer');
        if (!scrollContainer) return { width: 0, height: 0 };
        return { width: scrollContainer.clientWidth, height: scrollContainer.clientHeight };
    }
    
    function shouldCenterMode() {
        const boardSize = getBoardActualSize();
        const containerSize = getContainerSize();
        return boardSize.width <= containerSize.width;
    }
    
    function adjustScrollContainerAlignment() {
        const scrollContainer = document.getElementById('scrollContainer');
        if (!scrollContainer) return;
        const needCenter = shouldCenterMode();
        if (needCenter) {
            if (!scrollContainer.classList.contains('center-mode')) {
                scrollContainer.classList.add('center-mode');
                scrollContainer.scrollLeft = 0;
            }
        } else {
            if (scrollContainer.classList.contains('center-mode')) {
                scrollContainer.classList.remove('center-mode');
            }
        }
    }
    
    let savedScrollRatio = null;

    function saveScrollPosition() {
        const scrollContainer = document.getElementById('scrollContainer');
        if (!scrollContainer) return;
        if (!scrollContainer.classList.contains('center-mode')) {
            const maxScrollLeft = Math.max(0, scrollContainer.scrollWidth - scrollContainer.clientWidth);
            const maxScrollTop = Math.max(0, scrollContainer.scrollHeight - scrollContainer.clientHeight);
            savedScrollRatio = {
                left: maxScrollLeft > 0 ? scrollContainer.scrollLeft / maxScrollLeft : 0.5,
                top: maxScrollTop > 0 ? scrollContainer.scrollTop / maxScrollTop : 0.5
            };
        } else {
            savedScrollRatio = null;
        }
    }

    function restoreScrollPosition() {
        const scrollContainer = document.getElementById('scrollContainer');
        if (!scrollContainer || !savedScrollRatio) return;
        if (!scrollContainer.classList.contains('center-mode')) {
            requestAnimationFrame(() => {
                const maxScrollLeft = Math.max(0, scrollContainer.scrollWidth - scrollContainer.clientWidth);
                const maxScrollTop = Math.max(0, scrollContainer.scrollHeight - scrollContainer.clientHeight);
                scrollContainer.scrollLeft = savedScrollRatio.left * maxScrollLeft;
                scrollContainer.scrollTop = savedScrollRatio.top * maxScrollTop;
                savedScrollRatio = null;
            });
        } else {
            savedScrollRatio = null;
        }
    }

    function centerBoardInScroll() {
        const scrollContainer = document.getElementById('scrollContainer');
        if (!scrollContainer) return;
        const boardSize = getBoardActualSize();
        const containerSize = getContainerSize();
        if (scrollContainer.classList.contains('center-mode')) {
            scrollContainer.scrollLeft = 0;
            scrollContainer.scrollTop = 0;
        } else {
            if (boardSize.width > containerSize.width) {
                scrollContainer.scrollLeft = Math.max(0, (boardSize.width - containerSize.width) / 2);
            }
            if (boardSize.height > containerSize.height) {
                scrollContainer.scrollTop = Math.max(0, (boardSize.height - containerSize.height) / 2);
            }
        }
    }

    function renderBoardWithZoom() {
        if (!currentGame) return;
        
        const board = currentGame.getBoard();
        const rows = currentGame.rows, cols = currentGame.cols;
        const selected = currentGame.getSelected();
        const confirmed = currentGame.isConfirmed();
        
        const cellSize = BASE_CELL_SIZE * currentZoom;
        const boardWidth = cols * cellSize + (cols - 1) * GAP_SIZE + PADDING_SIZE * 2;
        const boardHeight = rows * cellSize + (rows - 1) * GAP_SIZE + PADDING_SIZE * 2;
        
        const boardContainer = document.getElementById('boardContainer');
        if (!boardContainer) return;
        
        boardContainer.style.display = 'inline-grid';
        boardContainer.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
        boardContainer.style.gap = `${GAP_SIZE}px`;
        boardContainer.style.padding = `${PADDING_SIZE}px`;
        boardContainer.style.width = `${boardWidth}px`;
        boardContainer.style.height = `${boardHeight}px`;
        
        boardContainer.innerHTML = '';
        
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const val = board[i][j];
                const isEmpty = (val === null);
                const isSelected = !confirmed && selected.some(s => s.r === i && s.c === j);
                const isMovable = confirmed && selected.some(s => s.r === i && s.c === j);
                let cls = 'cell';
                if (isEmpty) cls += ' empty';
                if (isSelected) cls += ' selected';
                if (isMovable && !isEmpty) cls += ' movable-piece';
                
                const cell = document.createElement('div');
                cell.className = cls;
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.style.fontSize = `${Math.max(12, cellSize * 0.35)}px`;
                cell.innerText = isEmpty ? ' ' : val.toString().padStart(2, '0');
                
                cell.addEventListener('click', (function(r,c) { return () => {
                    if (!isGameActive) return;
                    if (currentGame.isConfirmed()) { 
                        showDialog('已确认选择，如需重新选择请按重置'); 
                        return; 
                    }
                    currentGame.toggleSelect(r,c);
                    renderBoardWithZoom();
                    updateInfoUI();
                }; })(i,j));
                
                boardContainer.appendChild(cell);
            }
        }
        
        updateInfoUI();
        
        const confirmBtn = document.getElementById('confirmSelectBtn');
        const undoBtn = document.getElementById('undoBtn');
        const submitBtn = document.getElementById('submitBtn');
        if (confirmBtn) confirmBtn.disabled = currentGame.isConfirmed();
        if (undoBtn) undoBtn.disabled = !currentGame.isConfirmed() || currentGame.historyStack.length === 0;
        if (submitBtn) submitBtn.disabled = !currentGame.isConfirmed();
        
        const zoomPercent = document.getElementById('zoomPercent');
        if (zoomPercent) zoomPercent.innerText = `${Math.round(currentZoom * 100)}%`;
    }

    function zoomIn() {
        if (currentZoom >= MAX_ZOOM) return;
        saveScrollPosition();
        currentZoom = Math.min(MAX_ZOOM, currentZoom + ZOOM_STEP);
        renderBoardWithZoom();
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                adjustScrollContainerAlignment();
                restoreScrollPosition();
            });
        });
    }
    
    function zoomOut() {
        if (currentZoom <= MIN_ZOOM) return;
        saveScrollPosition();
        currentZoom = Math.max(MIN_ZOOM, currentZoom - ZOOM_STEP);
        renderBoardWithZoom();
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                adjustScrollContainerAlignment();
                restoreScrollPosition();
            });
        });
    }
    
    function resetZoom() {
        saveScrollPosition();
        currentZoom = 1.0;
        renderBoardWithZoom();
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                adjustScrollContainerAlignment();
                restoreScrollPosition();
            });
        });
    }

    function refreshGameUI() {
        renderBoardWithZoom();
        updateInfoUI();
        setTimeout(() => adjustScrollContainerAlignment(), 20);
    }

    function resetGame() {
        if (!currentGame) return;
        currentGame.resetToInitial();
        timerSeconds = 0;
        if (timerInterval) stopTimer();
        startTimer();
        isGameActive = true;
        refreshGameUI();
        setTimeout(() => centerBoardInScroll(), 100);
        showDialog('盘面已重置为初始状态', '重置成功', 'success');
    }

    async function submitGame() {
        if (!currentGame || !isGameActive) return;
        const finalScore = currentGame.getScore();
        const steps = currentGame.getSteps();
        const recordSnapshot = currentGame.getInitialSnapshot();
        
        addOrUpdateHistoryRecord(currentRows, currentCols, timerSeconds, steps, finalScore, recordSnapshot);
        
        await showDialog(`提交成功！\n得分:${finalScore}\n步数:${steps}\n用时:${timerSeconds}秒`, '成绩已保存', 'success');
        
        currentGame.resetToInitial();
        timerSeconds = 0;
        startTimer();
        refreshGameUI();
        setTimeout(() => centerBoardInScroll(), 100);
    }

    async function exitToMain() {
        if (currentGame && isGameActive) {
            const finalScore = currentGame.getScore();
            const steps = currentGame.getSteps();
            const recordSnapshot = currentGame.getInitialSnapshot();
            
            addOrUpdateHistoryRecord(currentRows, currentCols, timerSeconds, steps, finalScore, recordSnapshot);
            await showDialog(`退出游戏\n步数:${steps}\n得分:${finalScore}\n记录已保存`, '游戏退出', 'info');
        }
        stopTimer();
        isGameActive = false;
        showMainMenu();
    }

    // 历史记录弹窗
    function showHistoryModal() {
        const modal = document.createElement("div");
        modal.className = "modal-overlay";
        
        function renderHistoryList(container) {
            const list = loadHistory();
            if (list.length === 0) {
                container.innerHTML = "<div style='padding:20px; text-align:center; color:#6c4e2e;'>📭 暂无历史记录</div>";
                return;
            }
            container.innerHTML = "";
            list.forEach(rec => {
                const div = document.createElement("div");
                div.className = "history-record-item";
                div.innerHTML = `
                    <div class="history-record-info">
                        <strong>${rec.rows}×${rec.cols}</strong> | ${rec.time}s | 步数 ${rec.steps} | 得分 ${rec.score}
                    </div>
                    <div class="history-record-actions">
                        <button class="view-record-btn" data-id="${rec.id}">查看</button>
                        <button class="delete-record-btn" data-id="${rec.id}">删除</button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            container.querySelectorAll(".view-record-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = Number(btn.dataset.id);
                    const record = loadHistory().find(r => r.id === id);
                    if (record) showHistoryDetailModal(record);
                });
            });
            
            container.querySelectorAll(".delete-record-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = Number(btn.dataset.id);
                    deleteHistoryRecord(id);
                    renderHistoryList(container);
                });
            });
        }
        
        modal.innerHTML = `
            <div class="modal-content">
                <h2 style="margin-top:0;">📜 历史记录</h2>
                <div class="history-modal-scroll" id="historyRecordsContainer">
                    <div style="text-align:center; padding:20px;">加载中...</div>
                </div>
                <div class="modal-button-container">
                    <button id="closeHistoryBtn">关闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const container = modal.querySelector("#historyRecordsContainer");
        renderHistoryList(container);
        
        document.getElementById("closeHistoryBtn").addEventListener("click", () => modal.remove());
    }
    
    function showHistoryDetailModal(record) {
        const modal = document.createElement("div");
        modal.className = "modal-overlay";
        
        const board = record.boardSnapshot;
        const rows = board.length, cols = board[0].length;
        const maxPreviewRows = Math.min(rows, 12);
        const maxPreviewCols = Math.min(cols, 10);
        
        let previewHtml = `<div class="preview-board" style="grid-template-columns: repeat(${maxPreviewCols}, 40px); gap:2px;">`;
        for (let i = 0; i < maxPreviewRows; i++) {
            for (let j = 0; j < maxPreviewCols; j++) {

                previewHtml += `<div class="preview-cell" style="width:40px;height:40px;">${val.toString().padStart(2,'0')}</div>`;
            }
        }

            previewHtml += '<p style="text-align:center; margin-top:10px; color:#7c5f3a;">... 仅显示前12行/10列</p>';

            <div class="modal-content">

                    <p><strong>⏱️ 用时:</strong> ${record.time} 秒</p>

                    <p><strong>🍖 得分:</strong> ${record.score}</p>

            timerSeconds = 0;

    function startGameWithSize() {
        let w = currentCols, h = currentRows;
        w = Math.min(30, Math.max(10, w));
        h = Math.min(30, Math.max(10, h));
        currentCols = w; currentRows = h;
        stopTimer();
        currentGame = new GameEngine(h, w);
        timerSeconds = 0;
        isGameActive = true;
        startTimer();
        renderFullGameInterface();
    }

        }, 50);
    }

    function showRuleModal() {
        const modal = document.createElement("div");
        modal.className = "modal-overlay";
        modal.innerHTML = `
            <div class="modal-content">
                <h2 style="margin-top:0;">📖 游戏规则</h2>
                <div class="history-modal-scroll">
                    <div class="rule-text">
                        <strong>🎲 数字吞噬者</strong><br><br>
                        1️⃣ 开局先选择5枚棋子后，点击【确认选择】<br>
                        2️⃣ 方向键/WASD：所有棋子尝试同向移动一格<br>
                        3️⃣ 若目标格棋子的十位与移动棋子的十位相同，或个位与移动棋子的个位相同，则可以吞噬<br>
                        4️⃣ 无法移动的棋子留在原地，其他正常移动<br>
                        5️⃣ 移动的棋子之间不可以相互吞噬：当多个棋子移动到同一格时，按顺序依次吞噬合并<br>
                        6️⃣ 被吃掉的棋子变为空位，不会重新生成<br>
                        7️⃣ 目标：尽可能多的吃棋子获得高分！<br>
                        8️⃣ 支持撤销、重置、提交记录历史，可重复游玩历史盘面并更新高分。<br>
                        <br>
                        <strong>⚠️ 吃子规则示例：</strong><br>
                        • 23 和 25：十位相同(2=2) → 可以吃 ✓<br>
                        • 23 和 43：个位相同(3=3) → 可以吃 ✓<br>
                        • 23 和 54：十位(2≠5) 且 个位(3≠4) → 不能吃 ✗<br>
                    </div>
                </div>
                <div class="modal-button-container">
                    <button id="closeRuleBtn">关闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("closeRuleBtn").addEventListener("click", () => modal.remove());
    }

    function showMainMenu() {
        if (timerInterval) clearInterval(timerInterval);
        isGameActive = false;
        
        const mainHtml = `
            <div class="main-menu-container">
                <div class="main-menu-view">
                    <div class="game-title">🍢 数字吞噬者</div>
                    <div class="size-control">
                        <div class="slider-item">
                            <div class="slider-header">
                                <label>📏 宽度 (列数)</label>
                                <span class="slider-value" id="colVal">15</span>
                            </div>
                            <input type="range" id="colSlider" min="10" max="30" value="15" step="1">
                        </div>
                        <div class="slider-item">
                            <div class="slider-header">
                                <label>📐 高度 (行数)</label>
                                <span class="slider-value" id="rowVal">15</span>
                            </div>
                            <input type="range" id="rowSlider" min="10" max="30" value="15" step="1">
                        </div>
                    </div>
                    <div class="menu-buttons">
                        <button id="startFromMenu">✨ 开始游戏 </button>
                        <button id="ruleMenuBtn">📖 规则介绍</button>
                    </div>
                    <button id="historyMenuBtn" style="background: #7c5f3a; color: white; font-size: 1.3rem;">📜 历史记录</button>
                    <footer>🎲 选择5枚棋子 → 确认选择 → 方向键协同移动</footer>
                </div>
            </div>
        `;
        app.innerHTML = mainHtml;
        
        const colSlider = document.getElementById('colSlider');
        const rowSlider = document.getElementById('rowSlider');
        const colVal = document.getElementById('colVal');
        const rowVal = document.getElementById('rowVal');
        
        colSlider.addEventListener('input', (e) => {
            currentCols = parseInt(e.target.value);
            colVal.innerText = currentCols;
        });
        rowSlider.addEventListener('input', (e) => {
            currentRows = parseInt(e.target.value);
            rowVal.innerText = currentRows;
        });
        
        document.getElementById('startFromMenu').onclick = () => {
            currentCols = parseInt(colSlider.value);
            currentRows = parseInt(rowSlider.value);
            startGameWithSize();
        };
        document.getElementById('ruleMenuBtn').onclick = showRuleModal;
        document.getElementById('historyMenuBtn').onclick = showHistoryModal;
    }

    showMainMenu();
</script>
</body>
</html>
